name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]   # 3.13 included on purpose
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        env:
          AEGIS_SECRET_KEY: ci-test-key
          AEGIS_DATABASE_URL: sqlite:///./ci.db
        run: pytest -q

  # Promotion gate mirrors PostureScan's "fast-forward only" rule: production
  # (main) should only ever be a fast-forward of staging. This job documents
  # and (optionally) enforces it.
  promotion-guard:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "Tests green. Safe to fast-forward main from staging."
